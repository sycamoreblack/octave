name: Build whisper.cpp binaries

# Build ggerganov/whisper.cpp's `whisper-cli` for each platform we ship and
# upload it to a persistent `whisper-cpp-cache` GitHub release. The
# chart-editor downloads from this release on first vocals-charting job
# (src/main/strumIntegration/whisperCppBootstrap.ts).
#
# Bump WHISPER_CPP_BIN_VERSION in whisperCppBootstrap.ts and BIN_VERSION below
# in lockstep when changing the upstream commit, build flags, or output layout.
#
# We publish two variants per platform that supports both:
#   * cpu  — pure CPU build (no Metal/CUDA/BLAS), small + portable.
#   * cuda — cuBLAS-accelerated build for Windows/Linux x64. Bundles the
#            cuBLAS/cudart DLLs alongside the executable so the user does
#            not need a CUDA toolkit installed (just a recent NVIDIA driver).
#
# NOTE: Currently UNVALIDATED on Windows + macOS. Linux follows the upstream
# README verbatim. Trigger manually via workflow_dispatch to test.

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: 'ggerganov/whisper.cpp git ref (branch, tag, or sha)'
        required: false
        default: 'master'
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/whisper-cpp-binaries.yml'
      - 'src/main/strumIntegration/whisperCppBootstrap.ts'

env:
  BIN_VERSION: '2'
  UPSTREAM_REPO: 'ggerganov/whisper.cpp'
  UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'master' }}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  platform: linux,   arch: x64,   variant: cpu,  exe: whisper-cli }
          # Linux CUDA whisper.cpp is intentionally NOT built: ggml-cuda's
          # template-instance .cu files each peak ~4-5 GB during nvcc PTX
          # generation, and even --parallel 2 OOM-kills the GitHub-hosted
          # Linux runner (~16 GB RAM) at ~91% of the build. Linux NVIDIA
          # users still get GPU acceleration via Python demucs (torch+CUDA)
          # and onnxruntime-gpu; only whisper transcription falls back to
          # the CPU whisper.cpp binary, which is acceptable.
          - { os: macos-14,       platform: darwin,  arch: arm64, variant: cpu,  exe: whisper-cli }
          - { os: windows-latest, platform: win32,   arch: x64,   variant: cpu,  exe: whisper-cli.exe }
          - { os: windows-latest, platform: win32,   arch: x64,   variant: cuda, exe: whisper-cli.exe }

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout chart-editor
        uses: actions/checkout@v4

      - name: Install CUDA toolkit (Windows)
        if: matrix.variant == 'cuda' && matrix.platform == 'win32'
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.4.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'

      - name: Install CUDA toolkit (Linux)
        if: matrix.variant == 'cuda' && matrix.platform == 'linux'
        shell: bash
        run: |
          # Ubuntu 24.04 ships CUDA 12.0 in `nvidia-cuda-toolkit`; that's
          # plenty for building whisper.cpp's ggml-cuda backend. Avoids
          # the brittle Jimver/cuda-toolkit apt-name dance on Linux.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nvidia-cuda-toolkit
          nvcc --version

      - name: Clone whisper.cpp
        shell: bash
        run: |
          git clone --depth 1 --branch "${UPSTREAM_REF}" "https://github.com/${UPSTREAM_REPO}.git" upstream
          (cd upstream && git rev-parse HEAD)

      - name: Configure (Linux)
        if: matrix.platform == 'linux' && matrix.variant == 'cpu'
        shell: bash
        run: |
          cd upstream
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_BLAS=OFF \
            -DGGML_CUDA=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON

      - name: Configure (Linux CUDA)
        if: matrix.platform == 'linux' && matrix.variant == 'cuda'
        shell: bash
        run: |
          cd upstream
          # Single SM 8.6 (Ampere) arch keeps nvcc memory + time within the
          # GitHub-hosted Linux runner's budget (parallel nvcc OOM-killed at
          # multi-arch). PTX fallback (implicit trailing virtual) covers Ada,
          # Hopper, Blackwell via JIT on first launch.
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES="86" \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON

      - name: Configure (macOS)
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          cd upstream
          # Disable Metal so the binary is self-contained (no .metallib
          # sidecar to ship). CPU is plenty for q5_0 large-v3.
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_METAL=OFF \
            -DGGML_BLAS=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON

      - name: Configure (Windows)
        if: matrix.platform == 'win32' && matrix.variant == 'cpu'
        shell: bash
        run: |
          cd upstream
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_BLAS=OFF \
            -DGGML_CUDA=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON

      - name: Configure (Windows CUDA)
        if: matrix.platform == 'win32' && matrix.variant == 'cuda'
        shell: bash
        run: |
          cd upstream
          # Single SM 8.6 (Ampere) arch keeps the Windows runner build under
          # the 6h job timeout. PTX fallback covers Ada / Hopper / Blackwell
          # via JIT.
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_CUDA=ON \
            -DCMAKE_CUDA_ARCHITECTURES="61;86" \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON

      - name: Build whisper-cli
        shell: bash
        run: |
          cd upstream
          # Linux CUDA: cap parallel nvcc to 2 — multiple ggml-cuda .cu
          # translation units each consume ~3 GB at peak, and the runner's
          # ~16 GB RAM gets OOM-killed (exit 143) at higher concurrency.
          if [ "${{ matrix.platform }}" = "linux" ] && [ "${{ matrix.variant }}" = "cuda" ]; then
            cmake --build build --config Release --target whisper-cli --parallel 2
          else
            cmake --build build --config Release --target whisper-cli --parallel
          fi

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staged
          if [[ "${{ matrix.platform }}" == "win32" ]]; then
            # MSVC drops the binary in build/bin/Release; cli sources put it
            # in build/Release. Try both.
            for candidate in upstream/build/bin/Release/whisper-cli.exe upstream/build/Release/whisper-cli.exe upstream/build/bin/whisper-cli.exe; do
              if [[ -f "$candidate" ]]; then
                cp "$candidate" staged/whisper-cli.exe
                # Copy any DLLs in the same folder (shared ggml/whisper
                # libs from the CUDA build).
                cp "$(dirname "$candidate")"/*.dll staged/ 2>/dev/null || true
                break
              fi
            done
            # Bundle cuBLAS/cudart runtime DLLs so end users don't need
            # a CUDA toolkit installed (just a recent NVIDIA driver).
            if [[ "${{ matrix.variant }}" == "cuda" ]]; then
              CUDA_BIN="${CUDA_PATH}/bin"
              for dll in cublas64_12.dll cublasLt64_12.dll cudart64_12.dll; do
                if [[ -f "${CUDA_BIN}/${dll}" ]]; then
                  cp "${CUDA_BIN}/${dll}" staged/
                fi
              done
            fi
          else
            for candidate in upstream/build/bin/whisper-cli upstream/build/whisper-cli; do
              if [[ -f "$candidate" ]]; then
                cp "$candidate" staged/whisper-cli
                break
              fi
            done
            # Bundle libcublas/libcudart from Ubuntu's nvidia-cuda-toolkit
            # so the binary runs on machines without the toolkit installed
            # (only the NVIDIA driver is required).
            if [[ "${{ matrix.variant }}" == "cuda" && "${{ matrix.platform }}" == "linux" ]]; then
              for so in libcublas.so libcublasLt.so libcudart.so; do
                found=$(ldconfig -p | awk -v s="${so}" '$1 ~ s {print $NF; exit}')
                if [[ -n "${found}" && -f "${found}" ]]; then
                  cp -L "${found}" "staged/$(basename "${found}")"
                fi
              done
            fi
          fi
          ls -la staged
          test -f "staged/${{ matrix.exe }}"

      - name: Tar
        shell: bash
        run: |
          cd staged
          ASSET="whisper-cpp-bin-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.variant }}-v${BIN_VERSION}.tar.gz"
          tar -czf "../${ASSET}" .
          cd ..
          ls -la "${ASSET}"
          echo "ASSET=${ASSET}" >> "${GITHUB_ENV}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

      - name: Ensure whisper-cpp-cache release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if ! gh release view whisper-cpp-cache >/dev/null 2>&1; then
            gh release create whisper-cpp-cache \
              --title "whisper.cpp binary cache" \
              --notes "Automatically populated by .github/workflows/whisper-cpp-binaries.yml. Do not delete." \
              --prerelease
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload whisper-cpp-cache "${ASSET}" --clobber
